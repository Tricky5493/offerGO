<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal Test</title>
<style>
.screen { display: none; padding: 50px; text-align: center; font-size: 24px; }
.screen.active { display: block; }
#s1 { background: #e3f2fd; }
#s2 { background: #e8f5e9; }
button { font-size: 18px; padding: 15px 30px; margin: 20px; }
</style>
</head>
<body>

<div id="s1" class="screen active">
  <h1>Page 1</h1>
  <button onclick="switchPage(2)">Go to Page 2</button>
</div>

<div id="s2" class="screen">
  <h1>Page 2 - SUCCESS!</h1>
  <p>If you see this, it works!</p>
  <button onclick="switchPage(1)">Back to Page 1</button>
</div>

<script>
function switchPage(n) {
  document.getElementById('s1').classList.remove('active');
  document.getElementById('s2').classList.remove('active');
  document.getElementById('s' + n).classList.add('active');
}
</script>

</body>
</html>
