<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Switch Test V2</title>
<style>
.screen { display: none; padding: 40px; text-align: center; }
.screen.on { display: block; }
#a { background: #e3f2fd; }
#b { background: #e8f5e9; }
button { padding: 10px 20px; margin: 10px; }
</style>
</head>
<body>

<div id="a" class="screen on">
  <h1>Screen A</h1>
  <button onclick="goToB()">Go to B</button>
</div>

<div id="b" class="screen">
  <h1>Screen B - SUCCESS!</h1>
  <p>If you see this, screen switching works.</p>
  <button onclick="goToA()">Go to A</button>
</div>

<script>
// Method 1: Using classList + inline style (current approach)
function show(id) {
  document.querySelectorAll('.screen').forEach(function(el) {
    el.classList.remove('on');
    el.style.display = 'none';
  });
  var el = document.getElementById(id);
  el.style.display = 'block';
  el.classList.add('on');
}

// Method 2: Using only classList
function showClassOnly(id) {
  document.querySelectorAll('.screen').forEach(function(el) {
    el.classList.remove('on');
  });
  document.getElementById(id).classList.add('on');
}

// Method 3: Using only inline style
function showStyleOnly(id) {
  document.querySelectorAll('.screen').forEach(function(el) {
    el.style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}

function goToB() {
  // Try all three methods
  console.log('Trying show()...');
  show('b');
}

function goToA() {
  show('a');
}

// Debug: log initial state
console.log('Initial state:');
console.log('A display:', document.getElementById('a').style.display);
console.log('A classList:', document.getElementById('a').classList.toString());
</script>

</body>
</html>
